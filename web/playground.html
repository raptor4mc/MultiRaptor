<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MagPhos Web Studio</title>
  <link rel="stylesheet" href="playground.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>MagPhos Web Studio</h1>
      <p class="muted">Chromebook-friendly coding with files/folders, live runtime screen, and a bottom debug dock.</p>
    </div>
    <div class="actions wrap">
      <button id="newProjectBtn">New Project</button>
      <button id="exportBtn">Export Project</button>
      <label class="import-label" for="importInput">Import Project</label>
      <input id="importInput" type="file" accept="application/json" />
    </div>
  </header>

  <main class="workspace-grid">
    <aside class="panel files-panel">
      <div class="panel-title-row">
        <h2>Explorer</h2>
      </div>
      <div class="actions wrap explorer-actions">
        <button id="newFolderBtn" class="small">+ Folder</button>
        <button id="newFileBtn" class="small">+ File</button>
        <button id="renameFileBtn" class="small">Rename</button>
        <button id="deleteFileBtn" class="small danger">Delete</button>
      </div>
      <ul id="fileTree" class="file-tree"></ul>
    </aside>

    <section class="panel editor-panel">
      <div class="panel-title-row">
        <h2 id="activeFileLabel">Editor</h2>
      </div>
      <textarea id="source" spellcheck="false"></textarea>
    </section>

    <section class="panel stage-panel" id="stagePanel">
      <div class="panel-title-row">
        <h2>Runtime Screen</h2>
        <div class="actions">
          <button id="compileBtn">Compile</button>
          <button id="runBtn">Run</button>
          <button id="fullscreenBtn">Fullscreen</button>
        </div>
      </div>
      <div class="runtime-box" id="runtimeBox">
        <iframe id="runtimeFrame" title="Runtime Screen" sandbox="allow-scripts allow-modals"></iframe>
      </div>
    </section>
  </main>

  <section class="dock panel">
    <div class="tabs" role="tablist" aria-label="Bottom Dock Tabs">
      <button class="tab active" data-tab="problems">Problems</button>
      <button class="tab" data-tab="output">Output</button>
      <button class="tab" data-tab="terminal">Terminal</button>
      <button class="tab" data-tab="debug">Debug Console</button>
    </div>
    <pre id="panel-problems" class="dock-panel active"></pre>
    <pre id="panel-output" class="dock-panel"></pre>
    <pre id="panel-terminal" class="dock-panel"></pre>
    <pre id="panel-debug" class="dock-panel"></pre>
  </section>

  <template id="defaultProgram">#! Welcome to MagPhos
fn greet(name) {
  print "Hi " + name
}

var student = "Chromebook Coder"
greet(student)
</template>

  <script src="playground.js"></script>
</body>
</html>
