<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MultiRaptor Playground</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; background: #0f172a; color: #e2e8f0; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    textarea { width: 100%; min-height: 360px; background: #020617; color: #cbd5e1; border: 1px solid #334155; border-radius: 10px; padding: 12px; }
    pre { min-height: 260px; background: #020617; border: 1px solid #334155; border-radius: 10px; padding: 12px; white-space: pre-wrap; }
    button { background: #0ea5e9; color: #001018; border: none; border-radius: 8px; padding: 10px 16px; font-weight: 700; margin-right: 10px; cursor: pointer; }
    .muted { color: #94a3b8; }
  </style>
</head>
<body>
  <h1>MultiRaptor</h1>
  <p class="muted">Simple like Python, but running with JavaScript-style behavior.</p>

  <div class="grid">
    <div>
      <h3>MultiRaptor Code</h3>
      <textarea id="source"># MultiRaptor sample
var name = "Raptor"
var times = 3

fn cheer(person) {
  print "Hi " + person
}

repeat while times > 0 {
  cheer(name)
  set times = times - 1
}
</textarea>
    </div>
    <div>
      <h3>Compiled JavaScript</h3>
      <pre id="compiled"></pre>
      <h3>Output</h3>
      <pre id="output"></pre>
    </div>
  </div>

  <p>
    <button id="compileBtn">Compile</button>
    <button id="runBtn">Run</button>
  </p>

  <script>
    function trim(v) { return v.trim(); }

    function compileMultiRaptor(source) {
      const lines = source.split(/\r?\n/);
      let indent = 0;
      let out = "// Generated by MultiRaptor browser compiler\n'use strict';\n";

      const pad = (n) => ' '.repeat(n * 2);

      for (let i = 0; i < lines.length; i += 1) {
        const text = trim(lines[i]);
        if (!text || text.startsWith('//') || text.startsWith('#')) continue;

        if (text === '}') {
          indent = Math.max(0, indent - 1);
          out += `${pad(indent)}}\n`;
          continue;
        }

        if (text === 'else {') {
          indent = Math.max(0, indent - 1);
          out += `${pad(indent)}else {\n`;
          indent += 1;
          continue;
        }

        let m;
        if ((m = text.match(/^var\s+([A-Za-z_][A-Za-z0-9_]*)\s*=\s*(.+)$/))) {
          out += `${pad(indent)}let ${m[1]} = ${m[2]};\n`;
        } else if ((m = text.match(/^const\s+([A-Za-z_][A-Za-z0-9_]*)\s*=\s*(.+)$/))) {
          out += `${pad(indent)}const ${m[1]} = ${m[2]};\n`;
        } else if ((m = text.match(/^set\s+([A-Za-z_][A-Za-z0-9_]*)\s*=\s*(.+)$/))) {
          out += `${pad(indent)}${m[1]} = ${m[2]};\n`;
        } else if ((m = text.match(/^print\s+(.+)$/))) {
          out += `${pad(indent)}console.log(${m[1]});\n`;
        } else if ((m = text.match(/^ask\s+(.+)\s*->\s*([A-Za-z_][A-Za-z0-9_]*)$/))) {
          out += `${pad(indent)}let ${m[2]} = prompt(${m[1]}) ?? "";\n`;
        } else if ((m = text.match(/^if\s+(.+)\s*\{$/)) || (m = text.match(/^when\s+(.+)\s*\{$/))) {
          out += `${pad(indent)}if (${m[1]}) {\n`;
          indent += 1;
        } else if ((m = text.match(/^loop\s+(.+)\s*\{$/))) {
          out += `${pad(indent)}for (let __mr_i = 0; __mr_i < (${m[1]}); __mr_i += 1) {\n`;
          indent += 1;
        } else if ((m = text.match(/^repeat\s+while\s+(.+)\s*\{$/))) {
          out += `${pad(indent)}while (${m[1]}) {\n`;
          indent += 1;
        } else if ((m = text.match(/^fn\s+([A-Za-z_][A-Za-z0-9_]*)\s*\(([^)]*)\)\s*\{$/))) {
          out += `${pad(indent)}function ${m[1]}(${m[2]}) {\n`;
          indent += 1;
        } else if ((m = text.match(/^return\s+(.+)$/))) {
          out += `${pad(indent)}return ${m[1]};\n`;
        } else if (text === 'stop') {
          out += `${pad(indent)}break;\n`;
        } else if (text === 'next') {
          out += `${pad(indent)}continue;\n`;
        } else {
          throw new Error(`Syntax error at line ${i + 1}: ${text}`);
        }
      }

      if (indent !== 0) throw new Error('Syntax error: mismatched braces');
      return out;
    }

    const sourceEl = document.getElementById('source');
    const compiledEl = document.getElementById('compiled');
    const outputEl = document.getElementById('output');

    function doCompile() {
      const js = compileMultiRaptor(sourceEl.value);
      compiledEl.textContent = js;
      return js;
    }

    document.getElementById('compileBtn').addEventListener('click', () => {
      outputEl.textContent = '';
      try {
        doCompile();
      } catch (err) {
        outputEl.textContent = err.message;
      }
    });

    document.getElementById('runBtn').addEventListener('click', () => {
      outputEl.textContent = '';
      try {
        const js = doCompile();
        const logs = [];
        const originalLog = console.log;
        console.log = (...args) => logs.push(args.join(' '));
        try {
          new Function(js)();
        } finally {
          console.log = originalLog;
        }
        outputEl.textContent = logs.join('\n') || '(no output)';
      } catch (err) {
        outputEl.textContent = err.message;
      }
    });

    document.getElementById('compileBtn').click();
  </script>
</body>
</html>
