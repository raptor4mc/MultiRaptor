<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MagPhos Playground</title>
  <link rel="stylesheet" href="playground.css" />
</head>
<body>
  <h1>MagPhos</h1>
  <p class="muted">Simple like Python, but running with JavaScript-style behavior.</p>

  <div class="grid">
    <div>
      <h3>MP Code</h3>
      <textarea id="source">/! MagPhos sample
var name = "Raptor"
var times = 3

fn cheer(person) {
  print "Hi " + person
}

repeat while times > 0 {
  cheer(name)
  set times = times - 1
}
</textarea>
    </div>
    <div>
      <h3>Compiled JavaScript</h3>
      <pre id="compiled"></pre>
      <h3>Output</h3>
      <pre id="output"></pre>
    </div>
  </div>

  <p>
    <button id="compileBtn">Compile</button>
    <button id="runBtn">Run</button>
  </p>

  <script src="playground.js"></script>
</body>
</html>
