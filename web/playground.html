<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MagPhos Web Studio</title>
  <link rel="stylesheet" href="playground.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>MagPhos Web Studio</h1>
      <p class="muted">A Chromebook-friendly coding workspace for writing, running, and saving MagPhos projects.</p>
    </div>
    <div class="actions">
      <button id="newProjectBtn">New Project</button>
      <button id="exportBtn">Export Project</button>
      <label class="import-label" for="importInput">Import Project</label>
      <input id="importInput" type="file" accept="application/json" />
    </div>
  </header>

  <main class="studio-grid">
    <aside class="panel files-panel">
      <div class="panel-title-row">
        <h2>Files</h2>
        <button id="newFolderBtn" class="small">+ Folder</button>
        <button id="newFileBtn" class="small">+ File</button>
      </div>
      <ul id="fileList" class="file-list"></ul>
      <p class="muted tiny">Projects are auto-saved in your browser. Compiler runs through C++ WASM.</p>
    </aside>

    <section class="panel editor-panel">
      <div class="panel-title-row">
        <h2 id="activeFileLabel">Editor</h2>
        <div class="actions">
          <button id="renameFileBtn" class="small">Rename</button>
          <button id="deleteFileBtn" class="small danger">Delete</button>
        </div>
      </div>
      <textarea id="source" spellcheck="false"></textarea>
    </section>

    <section class="panel right-panel">
      <h2>Run & Output</h2>
      <div class="actions wrap">
        <button id="runBtn">Run</button>
        <button id="enableFallbackBtn" class="small" hidden>Enable Fallback</button>
      </div>
      <div class="actions wrap">
        <button id="consoleTabBtn" class="small">Console</button>
        <button id="terminalTabBtn" class="small">Terminal</button>
      </div>
      <h3 id="outputTitle">Console</h3>
      <pre id="consoleOutput"></pre>
      <pre id="terminalOutput" hidden></pre>
    </section>
  </main>

  <template id="defaultProgram">#! Welcome to MagPhos
fn greet(name) {
  print "Hi " + name
}

var student = "Chromebook Coder"
greet(student)
</template>

  <script src="playground.js"></script>
</body>
</html>
