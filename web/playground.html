<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MagPhos Web Studio</title>
  <link rel="stylesheet" href="playground.css" />
</head>
<body>
  <header class="titlebar">
    <div class="window-actions">⟵ ⟶</div>
    <input class="workspace-name" value="MultiRaptor [GitHub]" aria-label="workspace" />
  </header>

  <main class="ide-shell">
    <aside class="activity-bar" aria-label="activity bar">
      <button class="activity-btn active" data-panel="explorerPanel" title="Explorer">📄</button>
      <button class="activity-btn" data-panel="searchPanel" title="Search">🔎</button>
      <button class="activity-btn" data-panel="extensionsPanel" title="Extensions">🧩</button>
    </aside>

    <aside class="sidebar">
      <section id="explorerPanel" class="side-panel">
        <div class="panel-title-row">
          <h2>EXPLORER</h2>
          <div class="actions">
            <button id="newFolderBtn" class="small">+Folder</button>
            <button id="newFileBtn" class="small">+File</button>
          </div>
        </div>
        <input id="fileTreeFilter" class="tree-filter" type="search" placeholder="Filter files in tree" />
        <ul id="fileList" class="file-list"></ul>
        <button id="deleteFolderBtn" class="small danger">Delete Selected Folder</button>
      </section>

      <section id="searchPanel" class="side-panel hidden">
        <div class="panel-title-row"><h2>SEARCH</h2></div>
        <input id="globalSearchInput" class="tree-filter" type="search" placeholder="Search in files (ex: Mine)" />
        <ul id="searchResults" class="file-list"></ul>
      </section>

      <section id="extensionsPanel" class="side-panel hidden">
        <div class="panel-title-row"><h2>EXTENSIONS</h2></div>
        <p class="muted">No extensions installed yet.</p>
      </section>
    </aside>

    <section class="main-area">
      <section id="welcomePanel" class="welcome-panel">
        <h1>MagPhos Studio</h1>
        <p class="muted">Start empty, then import code or create new code.</p>
        <div class="actions">
          <button id="newProjectBtn">New Code</button>
          <label class="import-label" for="importInput">Import Code</label>
        </div>
      </section>

      <section class="editor-wrap">
        <div class="panel-title-row editor-head">
          <h2 id="activeFileLabel">Editor</h2>
          <div class="actions">
            <button id="renameFileBtn" class="small">Rename</button>
            <button id="deleteFileBtn" class="small danger">Delete</button>
            <button id="exportBtn" class="small">Export</button>
            <button id="runBtn">Run</button>
          </div>
        </div>
        <textarea id="source" spellcheck="false"></textarea>
      </section>

      <section class="bottom-panel">
        <div class="actions tabs">
          <button id="consoleTabBtn" class="small">OUTPUT</button>
          <button id="terminalTabBtn" class="small">TERMINAL</button>
        </div>
        <h3 id="outputTitle">Output</h3>
        <pre id="consoleOutput"></pre>
        <section id="terminalOutput" class="terminal-shell" hidden>
          <pre id="terminalHistory" class="terminal-history"></pre>
          <div class="terminal-input-row">
            <span class="terminal-prompt" id="terminalPrompt">$</span>
            <input id="terminalInput" type="text" autocomplete="off" spellcheck="false" />
          </div>
        </section>
      </section>
    </section>
  </main>

  <input id="importInput" type="file" accept="application/json" hidden />

  <template id="defaultProgram">#! Welcome to MagPhos
print "Hello"
</template>

  <script src="playground.js"></script>
</body>
</html>
