name: quality-matrix

on:
  pull_request:
  push:
    branches: [ main, work ]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build
      - name: Build
        run: cmake --build build -j2
      - name: Run tests
        shell: bash
        run: bash tools/scripts/run_tests.sh
