name: sanitizers

on:
  pull_request:
  push:
    branches: [ main, work ]

jobs:
  asan-ubsan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure ASan+UBSan
        run: cmake -S . -B build-asan -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
      - name: Build
        run: cmake --build build-asan -j2
      - name: Run tests
        run: bash tools/scripts/run_tests.sh

  tsan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure TSan
        run: cmake -S . -B build-tsan -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-fsanitize=thread -fno-omit-frame-pointer"
      - name: Build
        run: cmake --build build-tsan -j2
      - name: Run tests
        run: bash tools/scripts/run_tests.sh
